<!doctype html>
<html lang="en-us">
<head>
    <base href="https://cdn.jsdelivr.net/gh/web-ports/vice-city@796678be4ed26a13c1256be98781ca9b90beb981/">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no" />
    <title>Grand Theft Auto: Vice City</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* High-visibility button style */
        #fullscreenBtn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
            padding: 15px 30px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            font-family: sans-serif;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <!-- Fullscreen Button -->
    <button id="fullscreenBtn">ENTER FULLSCREEN</button>

    <div id="loading-text" style="color: white; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px;"> LOADING... </div>
    <div class="wasted-container" hidden></div>
    <div class="intro-container" hidden>
        <div class="loader-container">
            <div class="progress-bar-container" id='spinner'>
                <div class="progress-bar-fill"></div>
            </div>
            <div id="status">Downloading...</div>
            <div>
                <progress id="progress"></progress>
            </div>
        </div>
    </div>

    <input type="file" id="original-game-file" hidden>

    <!-- Canvas -->
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <div class="touch-controls-wrapper">
        <!-- (Your original touch controls remain here) -->
    </div>

    <script>
        // Fullscreen Logic
        const btn = document.getElementById('fullscreenBtn');
        const canvas = document.getElementById('canvas');

        btn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                if (canvas.requestFullscreen) {
                    canvas.requestFullscreen();
                } else if (canvas.webkitRequestFullscreen) {
                    canvas.webkitRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });

        // Your Original Game Logic
        alert("Thank you to bread for this port!");
        const loadingText = document.querySelector("#loading-text");
        // ... (Keep the rest of your original loading/fetching script here) ...
    </script>
</body>
</html>
